$terminal = kitty
$fileManager = $terminal --class float-fm -e yazi
$menu = TERMINAL=$terminal fuzzel
$viu-float = $terminal --class float-viu -e viu
$mainMod = SUPER # Sets "Windows" key as main modifier
$tpd = elan962c:00-04f3:30d0-touchpad
bindel = , XF86Tools, exec, toggle-touchpad

bind = $mainMod, Equal, layoutmsg, colresize +0.1
bind = $mainMod, Minus, layoutmsg, colresize -0.1
# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod , Q, killactive,
bind = $mainMod SHIFT CTRL, Q, forcekillactive,
bind = $mainMod SHIFT CTRL, E, exec, loginctl terminate-user ""
bind = $mainMod, grave, exec, hexecute
bind = $mainMod, Space, togglefloating,
bind = $mainMod SHIFT, P, pin,
bind = $mainMod, P, fullscreenstate, 1 1
bind = $mainMod SHIFT, F, fullscreenstate, 2 1
bind = ALT, TAB, cyclenext,
bind = $mainMod, F, layoutmsg, colresize +conf
# Applications
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod SHIFT, RETURN, exec, $fileManager
bind = $mainMod SHIFT, S, exec, wayfreeze --hide-cursor & PID=$!; sleep .1; grim -g "$(slurp)" - | wl-copy; kill $PID
bind = $mainMod CTRL SHIFT, S, exec, grim - | wl-copy | notify-send -i nix-snowflake-white "Screenshot taken" "Grim has screenshotted the full screen"
bind = , Print, exec, wayfreeze --hide-cursor & PID=$!; sleep .1; grim -g "$(slurp)" /tmp/screenshot.png; kill $PID ; swappy -f /tmp/screenshot.png
bind = $mainMod , Print, exec, wayfreeze --hide-cursor & PID=$!; sleep .1; grim -g "$(slurp)" /tmp/screenshot.png; kill $PID ; swappy -f /tmp/screenshot.png
bind = $mainMod SHIFT, R, exec, kurukurubar ipc call record start
bind = $mainMod, R, exec, kurukurubar ipc call record startArea "$(slurp)"
bind = $mainMod CTRL SHIFT, R, exec, kurukurubar ipc call record stop
bind = $mainMod, D, exec, pkill fuzzel || fuzzel
bind = $mainMod, O, exec, stash list | $menu --dmenu --prompt 'Clipboard History' | stash decode | wl-copy
bind = $mainMod SHIFT, space, exec, fish -c 'set input (history search | fuzzel --dmenu); if test -n "$input"; footclient fish -c "$input"; end'
bind = $mainMod, B, exec, fish -c 'systemctl --user (if test (systemctl --user is-active hyprsunset) = "inactive"; echo -n "start"; else; echo -n "stop"; end) hyprsunset'
# bind = $mainMod, O, exec, todo show | fuzzel --dmenu --prompt "done: " | awk 'BEGIN {FS="|"} {print $1}' | xargs todo done
bind = $mainMod SHIFT, O, exec, fuzzel --dmenu --prompt-only "task: " | KURU_TODO_CONCAT=1 xargs todo add
bind = $mainMod ALT, O, exec, todo show | fuzzel --dmenu --prompt "delete: " | awk 'BEGIN {FS="|"} {print $1}' | xargs todo remove

# Move focus with mainMod + hjkl (fuck arrow keys)
bind = $mainMod, H, layoutmsg, focus l
bind = $mainMod, L, layoutmsg , focus r

bind = $mainMod, left, layoutmsg, focus l
bind = $mainMod, right, layoutmsg , focus r
# bind = $mainMod, L, movefocus, r
bind = $mainMod, K, layoutmsg,focus u
bind = $mainMod, J, layoutmsg, focus d
bind = $mainMod, period, layoutmsg, promote
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
# Move window
bind = $mainMod SHIFT, H, layoutmsg, swapcol l
bind = $mainMod SHIFT, L, layoutmsg, swapcol r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
# Window into groups
bind = $mainMod CTRL, H, moveintogroup, l
bind = $mainMod CTRL, L, moveintogroup, r
bind = $mainMod CTRL, K, moveintogroup, u
bind = $mainMod CTRL, J, moveintogroup, d
# Window outof groups
# bind = $mainMod SHIFT CTRL, H, moveoutofgroup, l
# bind = $mainMod SHIFT CTRL, L, moveoutofgroup, r
bind = $mainMod SHIFT CTRL, K, moveoutofgroup, u
bind = $mainMod SHIFT CTRL, J, moveoutofgroup, d
# Switch Window in group
bind = $mainMod, TAB, changegroupactive, f
bind = $mainMod SHIFT, TAB, changegroupactive, b

# Special Workspace
bind = $mainMod, I, togglespecialworkspace, ruby
bind = $mainMod, U, togglespecialworkspace, ai
# Switch workspaces with mainMod + 123qweasd
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + 123qweasd
bind = $mainMod ALT, 1, movetoworkspace, 1
bind = $mainMod ALT, 2, movetoworkspace, 2
bind = $mainMod ALT, 3, movetoworkspace, 3
bind = $mainMod ALT, Q, movetoworkspace, 4
bind = $mainMod ALT, W, movetoworkspace, 5
bind = $mainMod ALT, E, movetoworkspace, 6
bind = $mainMod ALT, A, movetoworkspace, 7
bind = $mainMod ALT, S, movetoworkspace, 8
bind = $mainMod ALT, D, movetoworkspace, 9
bind = $mainMod ALT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
#bind = $mainMod, S, togglespecialworkspace, magic
#bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# lid switch
bindl=,switch:off:Lid Switch,exec,hyprctl keyword monitor "eDP-1,preferred,auto,auto"
bindl=,switch:on:Lid Switch,exec,hyprctl keyword monitor "eDP-1, disable"
