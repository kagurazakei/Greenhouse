$terminal = kitty
$fileManager = $terminal --class float-fm -e yazi
$menu = TERMINAL=$terminal fuzzel
$viu-float = $terminal --class float-viu -e viu
$mainMod = SUPER # Sets "Windows" key as main modifier
$tpd = elan962c:00-04f3:30d0-touchpad
bindel = , XF86Tools, exec, toggle-touchpad

bind = $mainMod, Equal, layoutmsg, colresize +0.1
bind = $mainMod, Minus, layoutmsg, colresize -0.1
# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod , Q, killactive,
bind = $mainMod SHIFT CTRL, Q, forcekillactive,
bind = $mainMod SHIFT CTRL, E, exec, loginctl terminate-user ""
bind = $mainMod, grave, exec, hexecute
bind = $mainMod, Space, togglefloating,
bind = $mainMod SHIFT, P, pin,
bind = $mainMod, P, fullscreenstate, 1 1
bind = $mainMod SHIFT, F, fullscreenstate, 2 1
bind = ALT, TAB, cyclenext,
bind = $mainMod, F, layoutmsg, colresize +conf
# Applications
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod SHIFT, RETURN, exec, $fileManager
bind = $mainMod SHIFT, S, exec, wayfreeze --hide-cursor & PID=$!; sleep .1; grim -g "$(slurp)" - | wl-copy; kill $PID
bind = $mainMod CTRL SHIFT, S, exec, grim - | wl-copy | notify-send -i nix-snowflake-white "Screenshot taken" "Grim has screenshotted the full screen"
bind = , Print, exec, wayfreeze --hide-cursor & PID=$!; sleep .1; grim -g "$(slurp)" /tmp/screenshot.png; kill $PID ; swappy -f /tmp/screenshot.png
bind = $mainMod , Print, exec, wayfreeze --hide-cursor & PID=$!; sleep .1; grim -g "$(slurp)" /tmp/screenshot.png; kill $PID ; swappy -f /tmp/screenshot.png
bind = $mainMod SHIFT, R, exec, kurukurubar ipc call record start
bind = $mainMod, R, exec, kurukurubar ipc call record startArea "$(slurp)"
bind = $mainMod CTRL SHIFT, R, exec, kurukurubar ipc call record stop
bind = $mainMod, D, exec, pkill fuzzel || fuzzel
bind = $mainMod, O, exec, stash list | $menu --dmenu --prompt 'Clipboard History' | stash decode | wl-copy
bind = $mainMod SHIFT, space, exec, fish -c 'set input (history search | fuzzel --dmenu); if test -n "$input"; footclient fish -c "$input"; end'
bind = $mainMod, B, exec, fish -c 'systemctl --user (if test (systemctl --user is-active hyprsunset) = "inactive"; echo -n "start"; else; echo -n "stop"; end) hyprsunset'
# bind = $mainMod, O, exec, todo show | fuzzel --dmenu --prompt "done: " | awk 'BEGIN {FS="|"} {print $1}' | xargs todo done
bind = $mainMod SHIFT, O, exec, fuzzel --dmenu --prompt-only "task: " | KURU_TODO_CONCAT=1 xargs todo add
bind = $mainMod ALT, O, exec, todo show | fuzzel --dmenu --prompt "delete: " | awk 'BEGIN {FS="|"} {print $1}' | xargs todo remove

# Ambxst 

bind = SUPER, Super_L, exec, ambxst run launcher # Custom Bind 0
bind = SUPER, M, exec, ambxst run dashboard # Custom Bind 1
bind = SUPER, A, exec, ambxst run assistant # Custom Bind 2
bind = SUPER, V, exec, ambxst run clipboard # Custom Bind 3
bind = SUPER, PERIOD, exec, ambxst run emoji # Custom Bind 4
bind = SUPER, N, exec, ambxst run notes # Custom Bind 5
bind = SUPER, T, exec, ambxst run tmux # Custom Bind 6
bind = SUPER, COMMA, exec, ambxst run wallpapers # Custom Bind 7
bind = SUPER, TAB, exec, ambxst run overview # Custom Bind 8
bind = SUPER, BACKSPACE, exec, ambxst run powermenu # Custom Bind 9
bind = SUPER SHIFT, C, exec, ambxst run config # Custom Bind 10
bind = CTRL ALT, L, exec, loginctl lock-session # Custom Bind 11
bind = SUPER, S, exec, ambxst run tools # Custom Bind 12
bind = SUPER SHIFT, S, exec, ambxst run screenshot # Custom Bind 13
bind = SUPER SHIFT, R, exec, ambxst run screenrecord # Custom Bind 14
bind = SUPER SHIFT, A, exec, ambxst run lens # Custom Bind 15
bind = SUPER ALT, B, exec, ambxst reload # Custom Bind 16
# Move focus with mainMod + hjkl (fuck arrow keys)
bind = $mainMod, H, layoutmsg, focus l
bind = $mainMod, L, layoutmsg , focus r

# bind = $mainMod, left, layoutmsg, focus l
# bind = $mainMod, right, layoutmsg , focus r
# bind = $mainMod, L, movefocus, r
bind = $mainMod, K, layoutmsg,focus u
bind = $mainMod, J, layoutmsg, focus d
bind = $mainMod, period, layoutmsg, promote
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
# Move window
bind = $mainMod SHIFT, H, layoutmsg, swapcol l
bind = $mainMod SHIFT, L, layoutmsg, swapcol r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
# Window into groups
bind = $mainMod CTRL, H, moveintogroup, l
bind = $mainMod CTRL, L, moveintogroup, r
bind = $mainMod CTRL, K, moveintogroup, u
bind = $mainMod CTRL, J, moveintogroup, d
# Window outof groups
# bind = $mainMod SHIFT CTRL, H, moveoutofgroup, l
# bind = $mainMod SHIFT CTRL, L, moveoutofgroup, r
bind = $mainMod SHIFT CTRL, K, moveoutofgroup, u
bind = $mainMod SHIFT CTRL, J, moveoutofgroup, d
# Switch Window in group
bind = $mainMod, TAB, changegroupactive, f
bind = $mainMod SHIFT, TAB, changegroupactive, b

# Special Workspace
bind = $mainMod, I, togglespecialworkspace, ruby
bind = $mainMod, U, togglespecialworkspace, ai
# Switch workspaces with mainMod + 123qweasd
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + 123qweasd
bind = $mainMod ALT, 1, movetoworkspace, 1
bind = $mainMod ALT, 2, movetoworkspace, 2
bind = $mainMod ALT, 3, movetoworkspace, 3
bind = $mainMod ALT, Q, movetoworkspace, 4
bind = $mainMod ALT, W, movetoworkspace, 5
bind = $mainMod ALT, E, movetoworkspace, 6
bind = $mainMod ALT, A, movetoworkspace, 7
bind = $mainMod ALT, S, movetoworkspace, 8
bind = $mainMod ALT, D, movetoworkspace, 9
bind = $mainMod ALT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
#bind = $mainMod, S, togglespecialworkspace, magic
#bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


bind = SUPER, Up, layoutmsg, focus u # Custom Bind 58
bind = SUPER CTRL, k, layoutmsg, focus u # Custom Bind 59
bind = SUPER, Down, layoutmsg, focus d # Custom Bind 60
bind = SUPER CTRL, j, layoutmsg, focus d # Custom Bind 61
bind = SUPER, Left, layoutmsg, focus l # Custom Bind 62
bind = SUPER CTRL, z, layoutmsg, focus l # Custom Bind 63
bind = SUPER CTRL, h, layoutmsg, focus l # Custom Bind 64
bind = SUPER, Right, layoutmsg, focus r # Custom Bind 65
bind = SUPER CTRL, x, layoutmsg, focus r # Custom Bind 66
bind = SUPER CTRL, l, layoutmsg, focus r # Custom Bind 67
bind = SUPER SHIFT, Left, layoutmsg, movewindowto l # Custom Bind 68
bind = SUPER SHIFT, h, layoutmsg, movewindowto l # Custom Bind 69
bind = SUPER SHIFT, Right, layoutmsg, movewindowto r # Custom Bind 70
bind = SUPER SHIFT, l, layoutmsg, movewindowto r # Custom Bind 71
bind = SUPER SHIFT, Up, layoutmsg, movewindowto u # Custom Bind 72
bind = SUPER SHIFT, k, layoutmsg, movewindowto u # Custom Bind 73
bind = SUPER SHIFT, Down, layoutmsg, movewindowto d # Custom Bind 74
bind = SUPER SHIFT, j, layoutmsg, movewindowto d # Custom Bind 75
bind = SUPER ALT, Right, layoutmsg, colresize +0.1 # Custom Bind 76
bind = SUPER ALT, l, layoutmsg, colresize +0.1 # Custom Bind 77
bind = SUPER ALT, Left, layoutmsg, colresize -0.1 # Custom Bind 78
bind = SUPER ALT, h, layoutmsg, colresize -0.1 # Custom Bind 79
bind = SUPER ALT, Down, resizeactive, 0 50 # Custom Bind 80
bind = SUPER ALT, j, resizeactive, 0 50 # Custom Bind 81
bind = SUPER ALT, Up, resizeactive, 0 -50 # Custom Bind 82
bind = SUPER ALT, k, resizeactive, 0 -50 # Custom Bind 83
bind = SUPER ALT, SPACE, layoutmsg, promote # Custom Bind 84
bind = SUPER CTRL, SPACE, layoutmsg, togglefit # Custom Bind 85
bind = SUPER SHIFT, SPACE, layoutmsg, colresize +conf # Custom Bind 86
# Laptop multimedia keys for volume and LCD brightness
# bind = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
# bind = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# bind = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
# bindel = ,XF86MonBrightnessUp, exec, ambxst brightness +10 eDP-1
# bindel = ,XF86MonBrightnessDown, exec, ambxst brightness -10 eDP-1

bind = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 10%+ # Custom Bind 52
bind = , XF86AudioLowerVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 10%- # Custom Bind 53
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle # Custom Bind 54
bind = , XF86MonBrightnessUp, exec, ambxst brightness +5 # Custom Bind 55
bind = , XF86MonBrightnessDown, exec, ambxst brightness -5 # Custom Bind 56
# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# lid switch
bindl=,switch:off:Lid Switch,exec,hyprctl keyword monitor "eDP-1,preferred,auto,auto"
bindl=,switch:on:Lid Switch,exec,hyprctl keyword monitor "eDP-1, disable"
