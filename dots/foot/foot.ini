[main]
gamma-correct-blending=false
dpi-aware=no
initial-window-mode=maximized
font=JetBrainsMono Nerd Font:size=15
font-bold=JetBrainsMono Nerd Font:weight=bold:size=14
font-bold-italic=JetBrainsMono Nerd Font:weight=bold:slant=italic:size=15
font-italic=JetBrainsMono Nerd Font:slant=italic:size=15
pad=5x5 center
include=~/.config/foot/themes/noctalia

[security]
osc52=enabled

[scrollback]
lines=2000
multiplier=2.0
indicator-format=line

[cursor]
unfocused-style=hollow
blink=yes

[mouse]
hide-when-typing=true

[key-bindings]
search-start=Control+Shift+f

[colors-dark]
alpha = 0.89
